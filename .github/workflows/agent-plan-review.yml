# Educational governance pattern:
# This workflow is intentionally simplified for artifact-reading practice.
# Review before reuse in production. Adapt permissions and gates to the target repository.
# It demonstrates governance concepts, not a production-ready integration.

name: Agent Plan Review

on:
  pull_request:
    branches:
      - main
    paths:
      - "artifacts/planner-output.json"
      - ".github/agents/**"
      - "docs/**"

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: agent-plan-review-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-plan:
    runs-on: ubuntu-latest
    outputs:
      plan_status: ${{ steps.validate.outputs.plan_status }}
      plan_artifact: ${{ steps.validate.outputs.plan_artifact }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate planner artifact exists
        id: validate
        run: |
          if [ -f artifacts/planner-output.json ]; then
            echo "plan_status=present" >> "$GITHUB_OUTPUT"
            echo "plan_artifact=artifacts/planner-output.json" >> "$GITHUB_OUTPUT"
          else
            echo "plan_status=missing" >> "$GITHUB_OUTPUT"
            echo "plan_artifact=none" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: planner-output
          path: artifacts/planner-output.json

  review-plan:
    runs-on: ubuntu-latest
    needs: validate-plan
    if: needs.validate-plan.outputs.plan_status == 'present'
    steps:
      - uses: actions/checkout@v4

      - name: Operator review notice
        run: |
          echo "Planner artifact ready for human or reviewer-agent inspection:"
          echo "${{ needs.validate-plan.outputs.plan_artifact }}"
