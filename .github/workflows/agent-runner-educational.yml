# Educational workflow:
# This demonstrates where an agent runner would validate agent profile changes
# before invoking high-risk tools. It is not a production agent runner.
# It must be reviewed before reuse and does not call an LLM, execute agent logic,
# or run shell commands generated by an agent.

name: Agent Runner Educational Review

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/agents/**"
      - ".github/workflows/**"
      - ".github/hooks/**"
      - "mcp/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: agent-runner-educational-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  review-control-plane:
    runs-on: ubuntu-latest
    outputs:
      review_status: ${{ steps.review.outputs.review_status }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect control-plane changes
        id: review
        run: |
          echo "This educational workflow does not invoke an agent runner."
          echo "Review these control-plane paths before any high-risk tool binding:"
          echo "- .github/agents/**"
          echo "- .github/workflows/**"
          echo "- .github/hooks/**"
          echo "- mcp/**"

          review_required=0

          if git diff --name-only "${{ github.event.pull_request.base.sha || github.sha }}" "${{ github.sha }}" 2>/dev/null | grep -E '^\.github/agents/' ; then
            echo "Agent profile change detected."
            review_required=1
          fi

          if git diff --name-only "${{ github.event.pull_request.base.sha || github.sha }}" "${{ github.sha }}" 2>/dev/null | grep -E '^\.github/workflows/' ; then
            echo "Workflow change detected."
            review_required=1
          fi

          if git diff --name-only "${{ github.event.pull_request.base.sha || github.sha }}" "${{ github.sha }}" 2>/dev/null | grep -E '^\.github/hooks/' ; then
            echo "Hook policy change detected."
            review_required=1
          fi

          if git diff --name-only "${{ github.event.pull_request.base.sha || github.sha }}" "${{ github.sha }}" 2>/dev/null | grep -E '^mcp/' ; then
            echo "MCP configuration change detected."
            review_required=1
          fi

          if grep -R 'name: executor' .github/agents 2>/dev/null; then
            echo "Executor profile present; require review before high-risk tool use."
          fi

          if grep -R 'execute' .github/agents 2>/dev/null; then
            echo "Tool access change review required for execute-capable profiles."
            review_required=1
          fi

          if [ "$review_required" -eq 1 ]; then
            echo "review_status=review_required" >> "$GITHUB_OUTPUT"
          else
            echo "review_status=no_control_plane_change_detected" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload educational agent profile review report
        uses: actions/upload-artifact@v4
        with:
          name: agent-profile-review-report
          path: artifacts/agent-profile-review-report.json
